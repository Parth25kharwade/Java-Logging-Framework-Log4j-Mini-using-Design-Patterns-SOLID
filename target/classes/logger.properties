# ─────────────────────────────────────────────────────────────────
# LogFramework — Configuration
# Copy to src/main/resources/logger.properties
# ─────────────────────────────────────────────────────────────────

# Minimum log level: DEBUG | INFO | WARN | ERROR | FATAL
log.level=DEBUG

# Log file base path (daily rotation adds date suffix automatically)
# Example output: logs/application-2025-04-09.log
log.file.path=logs/application.log

# Number of async worker threads draining the log queue
log.async.threads=2

# Cloud output — set to true to enable HTTP shipping
log.cloud.enabled=false
log.cloud.endpoint=https://mock-log-service.example.com/ingest
